version: 2

builds:
  - main: ./cmd/gotron-mcp
    binary: gotron-mcp
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/fbsobreira/gotron-mcp/internal/version.Version={{.Version}} -X github.com/fbsobreira/gotron-mcp/internal/version.Commit={{.ShortCommit}}

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  groups:
    - title: Features
      regexp: '^feat[:(!]'
      order: 0
    - title: Bug Fixes
      regexp: '^fix[:(!]'
      order: 1
    - title: Refactoring
      regexp: '^refactor[:(!]'
      order: 2
    - title: Build
      regexp: '^build[:(!]'
      order: 3
    - title: Other
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

brews:
  - repository:
      owner: fbsobreira
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://gotron.sh"
    description: "MCP server for TRON blockchain"
    license: "LGPL-3.0"
